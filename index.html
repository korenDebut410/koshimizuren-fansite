<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小清水蓮 応援サイト</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap');

    :root{
      --cream:#fff8e7;
      --mango:#ffc94a;
      --orange:#ff9f1c;
      --brown:#4a2f18;
      --green:#6fbf73;
      --white:#ffffff;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
      background:var(--cream);
      color:var(--brown);
      overflow-x:hidden;
    }

    #opening{
      position:fixed;
      inset:0;
      z-index:9999;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 1s ease, visibility 1s ease;
    }

    #opening.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .ren-photo{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:0;
      filter:brightness(.4) contrast(1.05);
      transform:scale(1.04);
      animation: photoFade 1.4s ease forwards .2s;
    }

    @keyframes photoFade{
      to{
        opacity:.96;
        transform:scale(1);
        filter:brightness(.68) contrast(1.04);
      }
    }

    .dark-vignette{
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 45%, transparent 0 34%, rgba(0,0,0,.42) 72%, #000 100%);
    }

    .vertical-name{
      position:relative;
      z-index:3;
      writing-mode:vertical-rl;
      text-orientation:upright;
      font-family:'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif;
      font-weight:900;
      letter-spacing:.16em;
      font-size:clamp(3.3rem, 13vw, 8.2rem);
      color:#fff;
      text-shadow:0 0 18px rgba(255,255,255,.25), 0 0 50px rgba(0,0,0,.95);
      line-height:1.05;
    }

    .vertical-name span{
      opacity:0;
      transform:translateY(18px);
      display:inline-block;
      animation: letterIn .65s ease forwards;
    }

    .vertical-name span:nth-child(1){ animation-delay:1.8s; }
    .vertical-name span:nth-child(2){ animation-delay:2.2s; }
    .vertical-name span:nth-child(3){ animation-delay:2.6s; }
    .vertical-name span:nth-child(4){ animation-delay:3s; }

    @keyframes letterIn{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .door-light{
      position:absolute;
      z-index:5;
      top:0;
      bottom:0;
      left:50%;
      width:2px;
      transform:translateX(-50%) scaleX(0);
      background:#fff;
      box-shadow:
        0 0 30px #fff,
        0 0 90px #fff,
        0 0 160px rgba(255,255,255,.95);
      opacity:0;
      pointer-events:none;
    }

    #opening.opening-light .door-light{
      animation: openLight 1.55s ease forwards;
    }

    @keyframes openLight{
      0%{ opacity:0; transform:translateX(-50%) scaleX(0); }
      18%{ opacity:1; transform:translateX(-50%) scaleX(1); }
      100%{ opacity:1; transform:translateX(-50%) scaleX(900); }
    }

    .white-flash{
      position:absolute;
      inset:0;
      z-index:6;
      background:#fff;
      opacity:0;
      pointer-events:none;
    }

    #opening.flash .white-flash{
      animation:whiteFlash 1.25s ease forwards;
    }

    #opening.flash .ren-photo,
    #opening.flash .vertical-name,
    #opening.flash .dark-vignette{
      animation: wrappedFade .45s ease forwards;
    }

    @keyframes wrappedFade{
      to{
        opacity:0;
        filter:brightness(2.5) blur(8px);
      }
    }

    @keyframes whiteFlash{
      0%{ opacity:0; }
      35%{ opacity:1; }
      78%{ opacity:1; }
      100%{ opacity:0; }
    }

    main{
      min-height:100vh;
      opacity:0;
      transition:opacity 1s ease;
    }

    main.show{ opacity:1; }

    .hamburger{
      position:fixed;
      top:18px;
      left:18px;
      z-index:100;
      width:46px;
      height:46px;
      border:none;
      border-radius:16px;
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 24px rgba(74,47,24,.13);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      cursor:pointer;
    }

    .hamburger span{
      width:22px;
      height:3px;
      background:var(--brown);
      border-radius:999px;
      transition:.3s ease;
    }

    .hamburger.active span:nth-child(1){
      transform:translateY(8px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2){
      opacity:0;
    }

    .hamburger.active span:nth-child(3){
      transform:translateY(-8px) rotate(-45deg);
    }

    .side-menu{
      position:fixed;
      top:0;
      left:0;
      z-index:90;
      width:min(280px,78vw);
      height:100vh;
      padding:90px 22px 24px;
      background:rgba(255,248,231,.94);
      backdrop-filter:blur(14px);
      box-shadow:12px 0 34px rgba(74,47,24,.15);
      transform:translateX(-105%);
      transition:transform .35s ease;
    }

    .side-menu.open{
      transform:translateX(0);
    }

    .side-menu a{
      display:block;
      text-decoration:none;
      color:var(--brown);
      font-weight:900;
      letter-spacing:.08em;
      padding:16px 14px;
      margin-bottom:10px;
      border-radius:18px;
      background:rgba(255,255,255,.65);
      border:1px solid rgba(255,159,28,.25);
    }

    .side-menu a:hover{
      background:#fff1b8;
    }

    .hero{
      min-height:100vh;
      position:relative;
      overflow:hidden;
      background:#000;
    }

    .hero-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:0;
      opacity:1;
      filter:brightness(1.08) saturate(1.12);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      z-index:1;
      background:rgba(255,244,180,.08);
      pointer-events:none;
    }

    .video-profile{
      position:absolute;
      right:50%;
      bottom:40vh;
      transform:translateX(50%);
      z-index:4;
      width:min(430px,84vw);
      color:#fff;
      text-shadow:0 2px 12px rgba(0,0,0,.65);
      font-family:'Noto Sans JP',sans-serif;
    }

    .video-profile h2{
      position:relative;
      margin:0 0 10px;
      font-size:clamp(1.6rem,5vw,2.4rem);
      letter-spacing:.08em;
      padding-bottom:8px;
      opacity:0;
      transform:translateY(12px);
      animation: profileFade .75s ease forwards 6.55s;
    }

    .video-profile h2::after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:1px;
      background:rgba(255,255,255,.85);
      transform:scaleX(0);
      transform-origin:left center;
      animation: lineGrow .7s ease forwards 6.85s;
    }

    .video-profile .name{
      position:relative;
      margin:0 0 16px;
      padding-bottom:6px;
      font-size:clamp(1.45rem,5.2vw,2.35rem);
      font-weight:900;
      letter-spacing:.06em;
      opacity:0;
      transform:translateY(12px);
      animation: profileFade .75s ease forwards 7.2s;
    }

    .video-profile .name::after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:1px;
      background:rgba(255,255,255,.28);
      transform:scaleX(0);
      transform-origin:left center;
      animation: lineGrow .7s ease forwards 7.5s;
    }

    .video-profile .name span{
      font-size:.72em;
      margin-left:10px;
      letter-spacing:.08em;
      font-weight:700;
    }

    .profile-list{
      display:grid;
      gap:7px;
      font-size:clamp(.86rem,3.2vw,1.05rem);
      font-weight:700;
      line-height:1.55;
    }

    .profile-list div{
      position:relative;
      display:grid;
      grid-template-columns:8.5em 1fr;
      gap:8px;
      padding-bottom:5px;
      opacity:0;
      transform:translateY(12px);
      animation: profileFade .7s ease forwards;
    }

    .profile-list div::after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:1px;
      background:rgba(255,255,255,.24);
      transform:scaleX(0);
      transform-origin:left center;
      animation: lineGrow .65s ease forwards;
    }

    .profile-list div:nth-child(1){ animation-delay:7.75s; }
    .profile-list div:nth-child(1)::after{ animation-delay:8.05s; }
    .profile-list div:nth-child(2){ animation-delay:8.05s; }
    .profile-list div:nth-child(2)::after{ animation-delay:8.35s; }
    .profile-list div:nth-child(3){ animation-delay:8.35s; }
    .profile-list div:nth-child(3)::after{ animation-delay:8.65s; }
    .profile-list div:nth-child(4){ animation-delay:8.65s; }
    .profile-list div:nth-child(4)::after{ animation-delay:8.95s; }
    .profile-list div:nth-child(5){ animation-delay:8.95s; }
    .profile-list div:nth-child(5)::after{ animation-delay:9.25s; }
    .profile-list div:nth-child(6){ animation-delay:9.25s; }
    .profile-list div:nth-child(6)::after{ animation-delay:9.55s; }
    .profile-list div:nth-child(7){ animation-delay:9.55s; }
    .profile-list div:nth-child(7)::after{ animation-delay:9.85s; }

    @keyframes profileFade{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes lineGrow{
      to{
        transform:scaleX(1);
      }
    }

    .profile-list dt,
    .profile-list dd{
      margin:0;
    }

    .profile-stamp{
      position:absolute;
      left:50%;
      top:50%;
      z-index:6;
      width:min(260px,58vw);
      transform:translate(-50%,-50%) rotate(-10deg) scale(2.2);
      opacity:0;
      pointer-events:none;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.28));
    }

    .profile-stamp.show{
      animation: stampPop .55s cubic-bezier(.2,1.55,.45,1) forwards;
    }

    @keyframes stampPop{
      0%{
        opacity:0;
        transform:translate(-50%,-50%) rotate(-18deg) scale(2.4);
      }
      55%{
        opacity:1;
        transform:translate(-50%,-50%) rotate(-8deg) scale(.88);
      }
      75%{
        transform:translate(-50%,-50%) rotate(-10deg) scale(1.08);
      }
      100%{
        opacity:1;
        transform:translate(-50%,-50%) rotate(-10deg) scale(1);
      }
    }

    .top-card-section{
      position:relative;
      z-index:3;
      padding:44px 18px 54px;
      background:
        linear-gradient(
          180deg,
          #fffef8 0%,
          #fff8d8 44%,
          #ffe88f 100%
        );
    }

    .card{
      width:min(920px,92vw);
      margin:0 auto;
      border:2px solid rgba(255,255,255,.85);
      border-radius:34px;
      padding:42px 22px 36px;
      background:rgba(255,255,255,.68);
      box-shadow:0 18px 60px rgba(74,47,24,.14);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      text-align:center;
    }

    h1{
      margin:0 0 14px;
      font-family:'Zen Maru Gothic','Noto Sans JP',sans-serif;
      font-size:clamp(3rem,12vw,7.3rem);
      line-height:1;
      letter-spacing:.08em;
      color:#5a3514;
      text-shadow:
        0 3px 0 rgba(255,255,255,.9),
        0 10px 24px rgba(255,159,28,.22);
    }

    .sub{
      font-size:clamp(1.1rem,4vw,1.55rem);
      font-weight:900;
      margin:14px 0 0;
      color:#7a4818;
    }

    .menu{
      margin-top:34px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .menu a{
      text-decoration:none;
      color:var(--brown);
      background:rgba(255,255,255,.72);
      border:1px solid rgba(255,159,28,.45);
      border-radius:20px;
      padding:18px 12px;
      font-weight:900;
      box-shadow:0 8px 18px rgba(74,47,24,.08);
    }

    section.content-section{
      position:relative;
      z-index:3;
      padding:80px 20px;
      background:rgba(255,253,246,.95);
    }

    section.content-section:nth-of-type(even){
      background:rgba(255,245,207,.95);
    }

    .section-inner{
      width:min(920px,92vw);
      margin:0 auto;
    }

    .section-inner h2{
      font-size:2rem;
      margin:0 0 14px;
      color:#6b3f17;
    }

    .section-inner p{
      margin:0;
      line-height:1.9;
      font-weight:700;
    }

    @media(max-width:520px){
      .video-profile{
        right:50%;
        bottom:28vh;
        transform:translateX(50%);
        width:86vw;
      }

      .profile-list div{
        grid-template-columns:7.7em 1fr;
      }

      .menu{ grid-template-columns:1fr; }

      .card{
        border-radius:26px;
        padding:34px 16px 28px;
      }
    }
  </style>
</head>
<body>

  <section id="opening">
    <img class="ren-photo" src="IMG_9149.jpeg" alt="小清水蓮" onerror="this.style.display='none'">
    <div class="dark-vignette"></div>

    <div class="vertical-name" aria-label="小清水蓮">
      <span>小</span><span>清</span><span>水</span><span>蓮</span>
    </div>

    <div class="door-light"></div>
    <div class="white-flash"></div>
  </section>

  <main id="site">
    <button class="hamburger" id="menuBtn" aria-label="メニューを開く">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="side-menu" id="sideMenu">
      <a href="#profile">PROFILE</a>
      <a href="#vote">VOTE</a>
      <a href="#movie">MOVIE</a>
      <a href="#official">公式サイト</a>
    </nav>

    <section class="hero">
      <video class="hero-video" autoplay muted loop playsinline>
        <source src="koren 3.mp4" type="video/mp4">
      </video>

      <div class="video-profile">
        <h2>PROFILE</h2>
        <p class="name">小清水蓮 <span>KO.REN</span></p>

        <dl class="profile-list">
          <div><dt>生年月日</dt><dd>2006/04/10</dd></div>
          <div><dt>出身地</dt><dd>宮崎県</dd></div>
          <div><dt>身長</dt><dd>170</dd></div>
          <div><dt>趣味</dt><dd>ゲーム、アニメ鑑賞、サッカー</dd></div>
          <div><dt>特技</dt><dd>水泳</dd></div>
          <div><dt>MBTI</dt><dd>ESFP</dd></div>
          <div><dt>私を表すキーワード</dt><dd>猫</dd></div>
        </dl>
      </div>

      <img class="profile-stamp" id="profileStamp" src="22BB8031-4E52-457A-B771-342481C25B3A.png" alt="PROFILEスタンプ">
    </section>

    <section class="top-card-section">
      <div class="card">
        <h1>小清水蓮</h1>
        <p class="sub">宮崎から世界へ。</p>

        <nav class="menu">
          <a href="#profile">PROFILE</a>
          <a href="#vote">VOTE</a>
          <a href="#movie">MOVIE</a>
          <a href="#official">公式サイト</a>
        </nav>
      </div>
    </section>

    <section class="content-section" id="profile">
      <div class="section-inner">
        <h2>PROFILE</h2>
        <p>小清水蓮くんのプロフィールをここに入れます。</p>
      </div>
    </section>

    <section class="content-section" id="vote">
      <div class="section-inner">
        <h2>VOTE</h2>
        <p>投票情報や応援方法をここに入れます。</p>
      </div>
    </section>

    <section class="content-section" id="movie">
      <div class="section-inner">
        <h2>MOVIE</h2>
        <p>おすすめ動画やステージ映像へのリンクをここに入れます。</p>
      </div>
    </section>

    <section class="content-section" id="official">
      <div class="section-inner">
        <h2>公式サイト</h2>
        <p>公式サイトへのリンクをここに入れます。</p>
      </div>
    </section>
  </main>

  <script>
    const opening = document.getElementById('opening');
    const site = document.getElementById('site');
    const menuBtn = document.getElementById('menuBtn');
    const sideMenu = document.getElementById('sideMenu');
    const profileStamp = document.getElementById('profileStamp');
    const hero = document.querySelector('.hero');
    let stampShown = false;

    function enterSite(){
      opening.classList.add('opening-light');

      setTimeout(() => {
        opening.classList.add('flash');
      }, 1550);

      setTimeout(() => {
        site.classList.add('show');
      }, 2300);

      setTimeout(() => {
        opening.classList.add('hide');
      }, 3100);
    }

    window.addEventListener('load', () => {
      setTimeout(enterSite, 3900);
    });

    window.addEventListener('scroll', () => {
      const triggerPoint = hero.offsetHeight * 0.2;

      if (!stampShown && window.scrollY > triggerPoint) {
        profileStamp.classList.add('show');
        stampShown = true;
      }
    });

    menuBtn.addEventListener('click', () => {
      menuBtn.classList.toggle('active');
      sideMenu.classList.toggle('open');
    });

    sideMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        menuBtn.classList.remove('active');
        sideMenu.classList.remove('open');
      });
    });
  </script>

</body>
</html>
