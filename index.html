<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小清水蓮 応援サイト</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Noto+Sans+JP:wght@400;700;900&display=swap');

    :root{
      --cream:#fff8e7;
      --mango:#ffc94a;
      --orange:#ff9f1c;
      --brown:#4a2f18;
      --green:#6fbf73;
      --black:#050505;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:'Noto Sans JP',sans-serif;
      background:var(--cream);
      color:var(--brown);
      overflow-x:hidden;
    }

    #opening{
      position:fixed;
      inset:0;
      z-index:9999;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 1s ease, visibility 1s ease;
    }

    #opening.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .ren-photo{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity:0;
      filter:brightness(.18) contrast(1.05);
      transform:scale(1.08);
      animation: photoFade 2.2s ease forwards .4s;
    }

    @keyframes photoFade{
      to{
        opacity:.92;
        transform:scale(1);
        filter:brightness(.42) contrast(1.06);
      }
    }

    .dark-vignette{
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 45%, transparent 0 25%, rgba(0,0,0,.62) 70%, #000 100%);
    }

    .vertical-name{
      position:relative;
      z-index:3;
      writing-mode:vertical-rl;
      text-orientation:upright;
      font-family:'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif;
      font-weight:900;
      letter-spacing:.16em;
      font-size:clamp(3.3rem, 13vw, 8.2rem);
      color:#fff;
      text-shadow:0 0 18px rgba(255,255,255,.25), 0 0 50px rgba(0,0,0,.95);
      line-height:1.05;
    }

    .vertical-name span{
      opacity:0;
      transform:translateY(18px);
      display:inline-block;
      animation: letterIn .8s ease forwards;
    }

    .vertical-name span:nth-child(1){ animation-delay:1.75s; }
    .vertical-name span:nth-child(2){ animation-delay:2.15s; }
    .vertical-name span:nth-child(3){ animation-delay:2.55s; }
    .vertical-name span:nth-child(4){ animation-delay:2.95s; }

    @keyframes letterIn{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .unlock{
      position:absolute;
      z-index:4;
      bottom:12vh;
      left:50%;
      transform:translateX(-50%);
      border:1px solid rgba(255,255,255,.48);
      color:#fff;
      background:rgba(0,0,0,.28);
      backdrop-filter:blur(8px);
      padding:13px 28px;
      border-radius:999px;
      font-size:14px;
      letter-spacing:.18em;
      opacity:0;
      animation: unlockShow .8s ease forwards 4.15s, pulse 1.8s ease-in-out infinite 5s;
      cursor:pointer;
    }

    @keyframes unlockShow{ to{ opacity:1; } }

    @keyframes pulse{
      50%{ box-shadow:0 0 28px rgba(255,255,255,.4); }
    }

    .door{
      position:absolute;
      inset:0;
      z-index:5;
      pointer-events:none;
      display:flex;
      opacity:0;
    }

    .door div{
      width:50%;
      background:#030303;
      transform:scaleX(1);
      transition:transform 1.15s cubic-bezier(.77,0,.18,1);
    }

    .door .left{
      transform-origin:left center;
      border-right:1px solid rgba(255,255,255,.1);
    }

    .door .right{
      transform-origin:right center;
      border-left:1px solid rgba(255,255,255,.1);
    }

    #opening.opening-door .door{ opacity:1; }
    #opening.opening-door .left{ transform:scaleX(0); }
    #opening.opening-door .right{ transform:scaleX(0); }

    .white-flash{
      position:absolute;
      inset:0;
      z-index:6;
      background:#fff;
      opacity:0;
      pointer-events:none;
    }

    #opening.flash .white-flash{
      animation:whiteFlash 1.1s ease forwards;
    }

    @keyframes whiteFlash{
      0%{ opacity:0; }
      35%{ opacity:1; }
      100%{ opacity:0; }
    }

    main{
      min-height:100vh;
      opacity:0;
      transition:opacity 1s ease;
    }

    main.show{ opacity:1; }

    .hero{
      min-height:100vh;
      padding:28px 18px 70px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 15% 16%, rgba(255,201,74,.55), transparent 28%),
        radial-gradient(circle at 85% 22%, rgba(111,191,115,.25), transparent 24%),
        linear-gradient(180deg,#fffdf6 0%, #fff4d2 100%);
      position:relative;
      overflow:hidden;
    }

    .cat{
      position:absolute;
      font-size:clamp(3rem,12vw,8rem);
      opacity:.08;
      transform:rotate(-12deg);
    }

    .cat.one{ left:8%; top:12%; }
    .cat.two{ right:8%; bottom:14%; transform:rotate(14deg); }

    .card{
      width:min(920px,92vw);
      border:2px solid rgba(255,159,28,.45);
      border-radius:32px;
      padding:34px 22px;
      background:rgba(255,255,255,.72);
      box-shadow:0 18px 60px rgba(74,47,24,.14);
      backdrop-filter:blur(10px);
      text-align:center;
    }

    .label{
      display:inline-block;
      padding:8px 18px;
      border-radius:999px;
      background:#fff0bd;
      color:#9b5c00;
      font-weight:900;
      letter-spacing:.08em;
    }

    h1{
      margin:20px 0 6px;
      font-family:'Noto Serif JP',serif;
      font-size:clamp(2.7rem,11vw,7rem);
      line-height:1;
      letter-spacing:.08em;
    }

    .sub{
      font-size:clamp(1rem,3.8vw,1.45rem);
      font-weight:900;
      margin:14px 0 24px;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top:22px;
    }

    .tags span{
      background:#fff;
      border:1px solid rgba(74,47,24,.16);
      border-radius:999px;
      padding:9px 14px;
      font-weight:700;
    }

    .menu{
      margin-top:28px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .menu a{
      text-decoration:none;
      color:var(--brown);
      background:linear-gradient(135deg,#fff,#fff3c7);
      border:1px solid rgba(255,159,28,.4);
      border-radius:20px;
      padding:18px 12px;
      font-weight:900;
      box-shadow:0 8px 18px rgba(74,47,24,.08);
    }

    @media(max-width:520px){
      .menu{ grid-template-columns:1fr; }
      .card{
        border-radius:24px;
        padding:28px 16px;
      }
    }
  </style>
</head>
<body>

  <section id="opening">
    <img class="ren-photo" src="IMG_9149.jpeg" alt="小清水蓮" onerror="this.style.display='none'">
    <div class="dark-vignette"></div>

    <div class="vertical-name" aria-label="小清水蓮">
      <span>小</span><span>清</span><span>水</span><span>蓮</span>
    </div>

    <button class="unlock" id="enterBtn">鍵を開ける</button>

    <div class="door">
      <div class="left"></div>
      <div class="right"></div>
    </div>

    <div class="white-flash"></div>
  </section>

  <main id="site">
    <section class="hero">
      <div class="cat one">🐈</div>
      <div class="cat two">🥭</div>

      <div class="card">
        <span class="label">KOSHIMIZU REN FAN SITE</span>
        <h1>小清水蓮</h1>
        <p class="sub">宮崎から世界へ。れんにゃんズで蓮くんを応援しよう。</p>

        <div class="tags">
          <span>宮崎</span>
          <span>ねこ</span>
          <span>マンゴー</span>
          <span>れんにゃんズ</span>
        </div>

        <nav class="menu">
          <a href="#profile">PROFILE</a>
          <a href="#vote">VOTE</a>
          <a href="#sns">SNS</a>
          <a href="#archive">ARCHIVE</a>
        </nav>
      </div>
    </section>
  </main>

  <script>
    const opening = document.getElementById('opening');
    const site = document.getElementById('site');
    const enterBtn = document.getElementById('enterBtn');

    function enterSite(){
      opening.classList.add('opening-door');
      setTimeout(() => opening.classList.add('flash'), 650);
      setTimeout(() => site.classList.add('show'), 900);
      setTimeout(() => opening.classList.add('hide'), 1700);
    }

    enterBtn.addEventListener('click', enterSite);

    setTimeout(enterSite, 5600);
  </script>

</body>
</html>
